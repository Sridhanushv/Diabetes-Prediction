{% extends 'base.html' %}
{% block content %}
<div class="container mt-5 mb-5 text-center">
	<h2 class="text-success">Training Successful</h2>
	{% if accuracy %}
	<p><strong>Model Accuracy:</strong>{{ accuracy }}%</p>
	<div class="my-4">
		<img src="{{ url_for('static',filename='images/confusion_matrix.png') }}"
		alt="Confusion Matrix"
		class="img-fluid"
		style="max-width: 100%; height: auto;">
	</div>
	{% endif %}
	<p class="mt-3">Your Model is now ready for prediction</p>
	<form action="{{ url_for('visualize') }}">
		<button type="submit" class="btn btn-primary"> Visualize</button>
	</form>
</div>
{% endblock %}
