{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
	<h2>Prediction Result</h2>
	<h4 class="mt-4">User Inputs:</h4>
	<table class="table table-bordered mt-3 text-dark table-light">
		<thead>
			<tr>
				<th>Feature</th>
				<th>Value</th>
			</tr>
		</thead>
		<tbody>
			{% for key,value in inputs.items() %}
			<tr>
				<td>{{ key }}</td>
				<td>{{ value }}</td>
			</tr>
			{% endfor %}
		</tbody>
	</table>
		<h4 class="mt-4" style="color:#fff; background-color:{% if result 	== 'Diabetes Detected' %}#dc3545{% else %}#28a745{% endif %}; padding:10px; text-align:center; border-radius:5px;">{{result}}</h4>
		<form action="/predict" style="display:inline;">
			<button type="submit">Make Another Prediction</button>
		</form>
	</div>
	{% endblock %}
