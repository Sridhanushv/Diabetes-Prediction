{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
	<h2>Dataset Visualizations</h2>
	<div class="mt-4">

		{% if scatter_plot %}
			<img src="{{url_for('static', filename='images/scatter_plot.png')}}" class="img-fluid">

	</form>
		{% endif %}
	</div>
</div>
{% endblock %}
